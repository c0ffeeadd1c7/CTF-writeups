title: "My CTF Writeups"
description: "Solutions, scripts, and notes from cybersecurity competitions."
remote_theme: just-the-docs/just-the-docs
color_scheme: dark
search_enabled: true
permalink: pretty
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red